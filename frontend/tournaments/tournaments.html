<!doctype html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>UFC Nexus — Events</title><script src="https://cdn.tailwindcss.com"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script><link rel="stylesheet" href="./tournaments.css"/></head><body><main><section class="page-hero"><p class="eyebrow" data-hero-line>Arena Inspired Events</p><h1 class="title-xl" data-hero-line>Upcoming tournaments</h1><p class="muted" data-hero-line>Register for events, validate fields, use Stripe, and store registrations for admin approval.</p></section><section class="section"><div class="grid-3" id="eventsGrid"></div></section><section class="section" id="register"><div class="section-head"><div><p class="eyebrow">Registration</p><h2>Secure your seat</h2></div></div><form id="registrationForm" class="arena-card card-pad form-grid"><div><label>Tournament</label><select id="tournamentId" name="tournamentId" class="arena-input" required></select></div><div><label>Seat Type</label><select name="seatType" class="arena-input"><option>Standard</option><option>Premium</option><option>VIP Cage Side</option></select></div><div><label>Name</label><input name="name" class="arena-input" required></div><div><label>Email</label><input name="email" type="email" class="arena-input" required></div><div><label>Age</label><input name="age" type="number" min="18" class="arena-input" required></div><div><label>Payment</label><select name="payNow" class="arena-input"><option value="yes">Pay now with Stripe</option><option value="later">Register then pay later</option></select></div><div class="full"><label>Notes</label><textarea name="notes" class="arena-input" rows="4"></textarea></div><button class="btn-primary full">Register and continue</button></form></section></main><script type="module" src="./tournaments.js"></script></body></html>
