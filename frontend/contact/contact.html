<!doctype html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>UFC Nexus — Contact</title><script src="https://cdn.tailwindcss.com"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script><link rel="stylesheet" href="./contact.css"/></head><body><main><section class="page-hero"><p class="eyebrow" data-hero-line>Contact the War Room</p><h1 class="title-xl" data-hero-line>Send a message</h1><p class="muted" data-hero-line>Frontend validation, backend validation, MongoDB storage, toast alerts, and Google Maps.</p></section><section class="section contact-layout"><form id="contactForm" class="arena-card card-pad form-grid" data-reveal><div><label>Name</label><input name="name" class="arena-input" required></div><div><label>Email</label><input name="email" type="email" class="arena-input" required></div><div class="full"><label>Phone</label><input name="phone" class="arena-input"></div><div class="full"><label>Message</label><textarea name="message" class="arena-input" rows="7" minlength="10" required></textarea></div><button class="btn-primary full">Send message</button></form><div class="arena-card card-pad" data-reveal><h2>UFC HQ</h2><p class="muted">Google Maps API-ready section with iframe fallback.</p><div id="map"></div><iframe class="map-frame" title="UFC Headquarters map" loading="lazy" src="https://www.google.com/maps?q=UFC%20Headquarters%20Las%20Vegas&output=embed"></iframe></div></section></main><script type="module" src="./contact.js"></script></body></html>
