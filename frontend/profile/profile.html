<!doctype html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>UFC Nexus — Profile</title><script src="https://cdn.tailwindcss.com"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script><link rel="stylesheet" href="./profile.css"/></head><body><main><section class="page-hero"><p class="eyebrow" data-hero-line>Protected Route</p><h1 class="title-xl" data-hero-line>Your fight profile</h1><p class="muted" data-hero-line>Avatar upload, saved fighters, theme preference, and recent activity.</p></section><section class="section profile-layout"><div class="arena-card card-pad" data-reveal><img id="avatarPreview" class="avatar" alt="Profile avatar"><form id="profileForm" class="form-grid" style="margin-top:1rem"><div class="full"><label>Name</label><input name="name" class="arena-input"></div><div class="full"><label>Avatar Upload</label><input name="avatar" type="file" accept="image/*" class="arena-input"></div><div class="full"><label>Theme</label><select name="theme" class="arena-input"><option value="dark-arena">Dark Arena</option><option value="champion-gold">Champion Gold</option><option value="red-bloodline">Red Bloodline</option></select></div><button class="btn-primary full">Save profile</button><button class="btn-danger full" id="logoutBtn" type="button">Sign out</button></form></div><div class="arena-card card-pad" data-reveal><h2>Saved Fighters</h2><div id="favorites" class="grid-2"></div><h2 style="margin-top:2rem">Recent activity</h2><div id="activity"></div></div></section></main><script type="module" src="./profile.js"></script></body></html>
