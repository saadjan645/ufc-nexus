<!doctype html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>UFC Nexus — Signup</title><script src="https://cdn.tailwindcss.com"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script><link rel="stylesheet" href="./auth.css"/></head><body><main class="auth-shell"><form id="signupForm" class="arena-card auth-card form-grid"><div class="full"><p class="eyebrow">Create Profile</p><h1 class="title-xl">Join Nexus</h1><p class="muted">Live validation, hashed passwords, JWT, and sessions.</p></div><div class="full"><label>Username</label><input name="username" class="arena-input" required minlength="3"></div><div class="full"><label>Email</label><input name="email" type="email" class="arena-input" required></div><div><label>Password</label><input name="password" type="password" class="arena-input" required minlength="8"></div><div><label>Confirm</label><input name="confirmPassword" type="password" class="arena-input" required minlength="8"></div><div class="full muted" id="passwordHint"></div><button class="btn-primary full">Create account</button><p class="full muted">Already have an account? <a href="./login.html">Sign in</a></p></form></main><script type="module" src="./auth.js"></script></body></html>
